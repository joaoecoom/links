<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Joao.ec∞m</title>
    <meta name="description" content="Links oficiais de Joao.ec∞m">
    <link rel="preload" href="assets/foto-instagram.png" as="image">
    <link rel="preload" href="assets/banner-mentoria.png" as="image">
    <style>
      :root {
        --bg: #030605;
        --panel: rgba(4, 12, 10, 0.74);
        --line: rgba(119, 255, 184, 0.62);
        --green: #10f48d;
        --text: #f4fff9;
        --muted: #b7c7c0;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.9)),
          radial-gradient(circle at 70% 22%, rgba(16, 244, 141, 0.24), transparent 33%),
          #020403;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        background-image: url("assets/banner-mentoria.png");
        background-position: center;
        background-size: cover;
        filter: blur(9px) grayscale(1);
        opacity: 0.16;
        transform: scale(1.05);
      }

      .page {
        width: min(100%, 760px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 56px 18px 42px;
      }

      .profile {
        display: grid;
        justify-items: center;
        gap: 14px;
        margin-bottom: 22px;
        text-align: center;
      }

      .avatar {
        width: clamp(104px, 28vw, 142px);
        aspect-ratio: 1;
        padding: 3px;
        border: 1px solid rgba(255, 255, 255, 0.92);
        border-radius: 50%;
        background: linear-gradient(145deg, #ffffff, var(--green), #ffffff);
        box-shadow: 0 0 34px rgba(16, 244, 141, 0.24);
      }

      .avatar img {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        object-position: center 22%;
      }

      h1 {
        margin: 0;
        font-size: clamp(25px, 7vw, 36px);
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0;
      }

      .instagram {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--text);
        font-size: clamp(18px, 4vw, 22px);
        font-weight: 750;
        text-decoration: none;
      }

      .instagram svg {
        width: 23px;
        height: 23px;
        flex: 0 0 auto;
      }

      .links {
        display: grid;
        gap: 18px;
      }

      .banner-link {
        display: block;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow:
          0 18px 54px rgba(0, 0, 0, 0.38),
          0 0 28px rgba(16, 244, 141, 0.12);
        text-decoration: none;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .banner-link:hover,
      .banner-link:focus-visible {
        border-color: rgba(176, 255, 214, 0.96);
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.46),
          0 0 38px rgba(16, 244, 141, 0.22);
        transform: translateY(-2px);
      }

      .banner-link:focus-visible,
      .instagram:focus-visible {
        outline: 3px solid rgba(16, 244, 141, 0.74);
        outline-offset: 4px;
      }

      .banner {
        display: block;
        width: 100%;
        height: auto;
      }

      .footer {
        margin-top: 22px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      @media (max-width: 520px) {
        .page {
          padding-top: 34px;
        }

        .profile {
          gap: 11px;
          margin-bottom: 18px;
        }

        .banner-link {
          border-radius: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="profile" aria-label="Perfil">
        <div class="avatar">
          <img src="assets/foto-instagram.png" alt="Foto de perfil de Joao.ec∞m">
        </div>
        <h1>Joao.ec∞m</h1>
        <a class="instagram" href="https://www.instagram.com/joao.ecoom/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
            <rect width="18" height="18" x="3" y="3" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
          </svg>
          <span>joao.ecoom</span>
        </a>
      </section>

      <section class="links" aria-label="Links">
        <a class="banner-link" href="https://wa.me/351968100700?text=Ol%C3%A1%21%20Vim%20pelo%20Instagram%20e%20gostaria%20de%20saber%20como%20funciona%20a%20mentoria%21" target="_blank" rel="noopener" aria-label="Falar no WhatsApp sobre a mentoria Joao.ec∞m">
          <img class="banner" src="assets/banner-mentoria.png" alt="Operação $100 por dia. Fala comigo agora.">
        </a>
      </section>

      <p class="footer">Links oficiais</p>
    </main>
  </body>
</html>
